<script>
const scriptURL = 'IDE_MÁSOLD_AZ_ÚJ_EXEC_URL-T';

// 1. MÓDOSÍTÁS: 90 napos nézet az adminban
function renderAdminCalendar() {
    const container = document.getElementById('adminCalendar');
    container.innerHTML = '';
    
    for (let i = 0; i < 90; i++) { // Itt a 14-et 90-re írtam
        const d = new Date();
        d.setDate(d.getDate() + i);
        const dateStr = d.toISOString().split('T')[0];
        // ... (itt jön a gombok generálása, hagyd meg az eredeti dizájnt)
    }
}

// 2. MÓDOSÍTÁS: Szabadság kapcsoló kezelése a mentésnél
function openAdminModal(date) {
    const modal = document.getElementById('adminModal');
    modal.dataset.date = date;
    const config = workingHours[date] || { start: '08:00', end: '18:00', closed: false };
    
    document.getElementById('startTime').value = config.start;
    document.getElementById('endTime').value = config.end;
    document.getElementById('isClosed').checked = config.closed; // Beállítja a pipát
    
    modal.style.display = 'flex';
}

function saveAdminHours() {
    const date = document.getElementById('adminModal').dataset.date;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const isClosed = document.getElementById('isClosed').checked; // Kiolvassa a pipát

    workingHours[date] = { start, end, closed: isClosed };

    fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify({ action: 'saveHours', workingHours: workingHours })
    }).then(() => {
        alert('Mentve!');
        document.getElementById('adminModal').style.display = 'none';
        renderAdminCalendar();
    });
}
</script>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>Munkaidő beállítása</h3>
        <div class="form-group">
            <label><input type="checkbox" id="isClosed"> 🏝️ SZABADSÁG / ZÁRVA</label>
        </div>
        <div class="form-group">
            <label>Kezdés:</label>
            <input type="time" id="startTime">
        </div>
        <div class="form-group">
            <label>Vége:</label>
            <input type="time" id="endTime">
        </div>
        <button onclick="saveAdminHours()">Mentés</button>
    </div>
</div>
